image_root : IMAGE_ROOT_PATH
label_root : TRACKING_LABEL_ROOT_PATH

model : 'ResNet_SSE'

# Dataloading
batch_size : 8
num_workers : 2
input_size : [621,188]
## Use mean/std values matching the pretrained backbone to ensure consistency
## Below normalization config based on our pretraining setup. Modify if necessary.
img_norm_cfg : 
    'mean': [103.53, 116.28, 123.675]
    'std': [1.0, 1.0, 1.0]
    
# Pretrained backbone
pretrained_backbone_path : PRETRAINED_BACKBONE_DIR

# Basis
permute : False

# Training
epochs : 20
initial_lr : 0.001
  
# ETC
seed : 42
save_dir: SAVE_PATH

